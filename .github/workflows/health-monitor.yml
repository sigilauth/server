# Health Monitor Workflow
#
# Polls /health endpoints every 5 minutes
# Creates GitHub issue on failure
# Auto-closes issue when health recovers
#
# Runs against:
#   - Production: https://auth.sigilauth.com/health
#   - Relay: https://relay.sigilauth.com/health

name: Health Monitor

on:
  schedule:
    # Every 5 minutes (offset from :00 and :30 to reduce load)
    - cron: '7,12,17,22,27,32,37,42,47,52,57,2 * * * *'

  workflow_dispatch:  # Manual trigger

jobs:
  health-check:
    name: Check service health
    runs-on: ubuntu-latest
    timeout-minutes: 3

    strategy:
      matrix:
        service:
          - name: sigil-server
            url: https://auth.sigilauth.com/health
            label: sigil
          - name: push-relay
            url: https://relay.sigilauth.com/health
            label: relay

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check health endpoint
        id: health
        continue-on-error: true
        run: |
          response=$(curl -f -s -w "\n%{http_code}" --max-time 10 "${{ matrix.service.url }}" || echo -e "\nFAILED")
          http_code=$(echo "$response" | tail -1)
          body=$(echo "$response" | head -n -1)

          echo "http_code=$http_code" >> $GITHUB_OUTPUT
          echo "body=$body" >> $GITHUB_OUTPUT

          if [ "$http_code" != "200" ]; then
            echo "Health check failed: HTTP $http_code"
            exit 1
          fi

      - name: Search existing issue
        id: existing
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'health-alert,${{ matrix.service.label }}'
            });

            if (issues.data.length > 0) {
              core.setOutput('issue_number', issues.data[0].number);
              core.setOutput('exists', 'true');
            } else {
              core.setOutput('exists', 'false');
            }

      - name: Create issue on failure
        if: failure() && steps.existing.outputs.exists == 'false'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: '🚨 Health Alert: ${{ matrix.service.name }} is down',
              labels: ['health-alert', 'P0', '${{ matrix.service.label }}'],
              body: `## Service Health Failure

            **Service:** ${{ matrix.service.name }}
            **Endpoint:** ${{ matrix.service.url }}
            **HTTP Status:** ${{ steps.health.outputs.http_code }}
            **Time:** ${new Date().toISOString()}
            **Workflow:** [Run #${context.runNumber}](${context.payload.repository.html_url}/actions/runs/${context.runId})

            ### Response Body
            \`\`\`
            ${{ steps.health.outputs.body }}
            \`\`\`

            ### Remediation Steps

            1. Check service logs: \`docker logs sigil\` or \`docker logs relay\`
            2. Verify network connectivity
            3. Check resource utilization (CPU, memory, disk)
            4. Review recent deployments
            5. Consult [runbook](../docs/runbooks/service-down.md)

            ---
            *This issue was automatically created by the health monitor workflow.*
            `
            });

      - name: Close issue on recovery
        if: success() && steps.existing.outputs.exists == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: ${{ steps.existing.outputs.issue_number }},
              body: `✅ Service has recovered. Health endpoint now returning 200 OK.

            **Recovery Time:** ${new Date().toISOString()}
            **Workflow:** [Run #${context.runNumber}](${context.payload.repository.html_url}/actions/runs/${context.runId})
            `
            });

            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: ${{ steps.existing.outputs.issue_number }},
              state: 'closed'
            });

      - name: Comment on ongoing failure
        if: failure() && steps.existing.outputs.exists == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: ${{ steps.existing.outputs.issue_number }},
              body: `⚠️ Service still down. HTTP ${{ steps.health.outputs.http_code }}

            **Time:** ${new Date().toISOString()}
            `
            });

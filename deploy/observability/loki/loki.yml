# Loki Configuration for Sigil Auth
#
# Aggregates stdout JSON logs from sigil and relay containers
# Pairs with Promtail to scrape Docker logs
#
# Usage:
#   docker run -d \
#     -p 3100:3100 \
#     -v $(pwd)/deploy/observability/loki:/etc/loki:ro \
#     --network sigil-network \
#     grafana/loki

auth_enabled: false

server:
  http_listen_port: 3100
  grpc_listen_port: 9096

common:
  path_prefix: /loki
  storage:
    filesystem:
      chunks_directory: /loki/chunks
      rules_directory: /loki/rules
  replication_factor: 1
  ring:
    instance_addr: 127.0.0.1
    kvstore:
      store: inmemory

schema_config:
  configs:
    - from: 2024-01-01
      store: boltdb-shipper
      object_store: filesystem
      schema: v11
      index:
        prefix: index_
        period: 24h

# Retention: 7 days for dev, 30 days for prod
limits_config:
  retention_period: 168h  # 7 days
  reject_old_samples: true
  reject_old_samples_max_age: 168h
  ingestion_rate_mb: 16
  ingestion_burst_size_mb: 32
  per_stream_rate_limit: 8MB
  per_stream_rate_limit_burst: 16MB

# Compactor for retention enforcement
compactor:
  working_directory: /loki/compactor
  shared_store: filesystem
  compaction_interval: 10m
  retention_enabled: true
  retention_delete_delay: 2h
  retention_delete_worker_count: 150

# Query limits
query_scheduler:
  max_outstanding_requests_per_tenant: 2048

ruler:
  alertmanager_url: http://alertmanager:9093
  storage:
    type: local
    local:
      directory: /loki/rules
  rule_path: /tmp/loki/rules
  ring:
    kvstore:
      store: inmemory
  enable_api: true

# Nginx TLS Termination for Sigil Relay
#
# Usage:
#   docker run -d \
#     -p 443:443 \
#     -v $(pwd)/certs:/etc/nginx/certs:ro \
#     -v $(pwd)/deploy/nginx.conf:/etc/nginx/nginx.conf:ro \
#     --network sigil-network \
#     nginx:alpine
#
# Or use Caddy for automatic ACME (see deploy/Caddyfile)

events {
    worker_connections 1024;
}

http {
    # Logging
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log warn;

    # Upstream relay
    upstream relay {
        server relay:8080;
    }

    # HTTPS server
    server {
        listen 443 ssl http2;
        server_name relay.sigilauth.com;

        # TLS certificates
        ssl_certificate /etc/nginx/certs/cert.pem;
        ssl_certificate_key /etc/nginx/certs/key.pem;

        # TLS configuration (Mozilla Intermediate)
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers off;

        # HSTS
        add_header Strict-Transport-Security "max-age=63072000" always;

        # Proxy to relay
        location / {
            proxy_pass http://relay;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Timeouts
            proxy_connect_timeout 5s;
            proxy_send_timeout 10s;
            proxy_read_timeout 10s;
        }
    }

    # HTTP redirect to HTTPS
    server {
        listen 80;
        server_name relay.sigilauth.com;
        return 301 https://$server_name$request_uri;
    }
}

# CodeQL Security Analysis for Go
# Copy to: .github/workflows/codeql.yml in sigilauth/server and sigilauth/relay

name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 6 * * 1' # Weekly Monday 6am UTC

permissions:
  security-events: write
  contents: read

jobs:
  analyze:
    name: Analyze Go
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: go
          queries: +security-extended,security-and-quality

      - name: Build
        run: go build ./...

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:go"

      # Sigil-specific: Check for common crypto mistakes
      - name: Check crypto patterns
        run: |
          echo "Checking for insecure crypto patterns..."
          
          # No math/rand for crypto
          if grep -r "math/rand" --include="*.go" .; then
            echo "::error::Found math/rand usage. Use crypto/rand instead."
            exit 1
          fi
          
          # No hardcoded keys
          if grep -rE "-----BEGIN (RSA|EC|PRIVATE)" --include="*.go" .; then
            echo "::error::Found hardcoded private key."
            exit 1
          fi
          
          # No md5 or sha1 for security
          if grep -rE "crypto/(md5|sha1)" --include="*.go" .; then
            echo "::warning::Found MD5/SHA1 usage. Ensure not used for security."
          fi
          
          echo "Crypto pattern check passed."
